name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Types · Lint · Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (extension + webview)
        run: npm run check-types

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  package:
    name: Package .vsix
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies -o aidlc-tracker.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: aidlc-tracker-vsix
          path: aidlc-tracker.vsix
          retention-days: 30
